name: Bug Report
description: Report a bug in ReaClaw
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check that you are on the latest release and that the issue is not already reported.

  - type: input
    id: version
    attributes:
      label: ReaClaw version
      description: From `GET /health` → `version` field, or from the REAPER console on startup.
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: reaper_version
    attributes:
      label: REAPER version
      description: From REAPER → Help → About REAPER
      placeholder: "e.g. 7.12"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reliably trigger the bug.
      placeholder: |
        1. Send request: POST /execute/action { "id": ... }
        2. Observe REAPER console
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: REAPER console output or ReaClaw log file. Wrap in ``` for formatting.
      render: text

  - type: textarea
    id: config
    attributes:
      label: Config (sanitize your API key)
      description: Your `config.json` with the `auth.key` replaced with `***`.
      render: json
