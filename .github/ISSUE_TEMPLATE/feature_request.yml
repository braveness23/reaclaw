name: Feature Request
description: Propose a new feature or API endpoint
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Read `ReaClaw_Design.md` and `ReaClaw_TECH_DECISIONS.md` before filing — the decisions recorded there explain why certain things are out of scope.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the agent workflow or REAPER operation that is currently blocked or awkward.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API endpoint, behavior, or change would solve it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you rejected them.

  - type: dropdown
    id: phase
    attributes:
      label: Relevant implementation phase
      description: From the implementation checklist — which phase does this belong in?
      options:
        - Phase 0 (Foundation)
        - Phase 1 (Scripts & Sequences)
        - Phase 2 (Integration & Hardening)
        - New phase / unsure
