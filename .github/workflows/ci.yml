name: CI

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

# Pinned vendor versions — update here and in vendor/README.md together
env:
  SQLITE_ZIP_URL: https://www.sqlite.org/2024/sqlite-amalgamation-3470200.zip
  JSON_HPP_URL:   https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp
  HTTPLIB_URL:    https://raw.githubusercontent.com/yhirose/cpp-httplib/master/httplib.h
  REAPER_SDK_URL: https://github.com/justinfrankel/reaper-sdk.git
  WDL_URL:        https://github.com/justinfrankel/WDL.git

jobs:
  # ---------------------------------------------------------------------------
  # Linux — GCC, self-hosted ARC runner
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux, GCC)
    runs-on: arc-runner-reaclaw
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev unzip git

      - name: Fetch vendor deps
        run: |
          curl -fsSL $HTTPLIB_URL   -o vendor/httplib.h
          curl -fsSL $JSON_HPP_URL  -o vendor/json.hpp
          curl -fsSL $SQLITE_ZIP_URL -o /tmp/sqlite.zip
          unzip -j /tmp/sqlite.zip "*/sqlite3.c" "*/sqlite3.h" -d vendor/
          git clone --depth=1 $REAPER_SDK_URL vendor/reaper-sdk
          cp vendor/reaper-sdk/sdk/*.h vendor/reaper-sdk/
          git clone --depth=1 --filter=blob:none --sparse $WDL_URL /tmp/wdl-tmp
          cd /tmp/wdl-tmp && git sparse-checkout set WDL/swell
          mkdir -p $GITHUB_WORKSPACE/vendor/WDL
          cp -r /tmp/wdl-tmp/WDL/swell $GITHUB_WORKSPACE/vendor/WDL/

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Rename artifact
        run: cp build/reaper_reaclaw.so reaper_reaclaw-linux-x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-linux-x86_64
          path: reaper_reaclaw-linux-x86_64.so

  # ---------------------------------------------------------------------------
  # macOS — Clang, macos-14 (Apple Silicon)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build (macOS, Clang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake openssl@3 unzip

      - name: Fetch vendor deps
        run: |
          curl -fsSL $HTTPLIB_URL   -o vendor/httplib.h
          curl -fsSL $JSON_HPP_URL  -o vendor/json.hpp
          curl -fsSL $SQLITE_ZIP_URL -o /tmp/sqlite.zip
          unzip -j /tmp/sqlite.zip "*/sqlite3.c" "*/sqlite3.h" -d vendor/
          git clone --depth=1 $REAPER_SDK_URL vendor/reaper-sdk
          cp vendor/reaper-sdk/sdk/*.h vendor/reaper-sdk/
          git clone --depth=1 --filter=blob:none --sparse $WDL_URL /tmp/wdl-tmp
          cd /tmp/wdl-tmp && git sparse-checkout set WDL/swell
          mkdir -p $GITHUB_WORKSPACE/vendor/WDL
          cp -r /tmp/wdl-tmp/WDL/swell $GITHUB_WORKSPACE/vendor/WDL/

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Rename artifact
        run: cp build/reaper_reaclaw.dylib reaper_reaclaw-macos-arm64.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-macos-arm64
          path: reaper_reaclaw-macos-arm64.dylib

  # ---------------------------------------------------------------------------
  # Windows — MinGW-w64 cross-compile on Linux (k3s runner)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows, MinGW cross-compile)
    runs-on: arc-runner-reaclaw
    env:
      OPENSSL_VERSION: 3.3.2
      OPENSSL_INSTALL: /opt/openssl-mingw64
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 cmake unzip

      - name: Cache cross-compiled OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /opt/openssl-mingw64
          key: openssl-mingw64-${{ env.OPENSSL_VERSION }}

      - name: Cross-compile OpenSSL for Windows
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://www.openssl.org/source/openssl-$OPENSSL_VERSION.tar.gz | tar xz
          cd openssl-$OPENSSL_VERSION
          ./Configure mingw64 \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=$OPENSSL_INSTALL \
            no-shared no-tests
          make -j$(nproc)
          sudo make install_sw

      - name: Fetch vendor deps
        run: |
          curl -fsSL $HTTPLIB_URL   -o vendor/httplib.h
          curl -fsSL $JSON_HPP_URL  -o vendor/json.hpp
          curl -fsSL $SQLITE_ZIP_URL -o /tmp/sqlite.zip
          unzip -j /tmp/sqlite.zip "*/sqlite3.c" "*/sqlite3.h" -d vendor/
          git clone --depth=1 $REAPER_SDK_URL vendor/reaper-sdk
          cp vendor/reaper-sdk/sdk/*.h vendor/reaper-sdk/

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_INSTALL \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DREACLAW_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Rename artifact
        run: cp build/reaper_reaclaw.dll reaper_reaclaw-windows-x64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-windows-x64
          path: reaper_reaclaw-windows-x64.dll

  # ---------------------------------------------------------------------------
  # clang-format check
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format
    runs-on: arc-runner-reaclaw
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14

      - name: Check formatting
        run: |
          find src -name "*.cpp" -o -name "*.h" | \
            xargs clang-format-14 --dry-run --Werror

  # ---------------------------------------------------------------------------
  # Release — runs only on version tags; waits for all builds to pass
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: arc-runner-reaclaw
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List downloaded files
        run: find dist/ -type f

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ReaClaw ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/reaper_reaclaw-linux-x86_64/reaper_reaclaw-linux-x86_64.so
            dist/reaper_reaclaw-macos-arm64/reaper_reaclaw-macos-arm64.dylib
            dist/reaper_reaclaw-windows-x64/reaper_reaclaw-windows-x64.dll
