name: CI

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Linux — GCC, ubuntu-22.04
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux, GCC)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev libsqlite3-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Rename artifact
        run: cp build/reaper_reaclaw.so reaper_reaclaw-linux-x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-linux-x86_64
          path: reaper_reaclaw-linux-x86_64.so

  # ---------------------------------------------------------------------------
  # macOS — Clang, macos-14 (Apple Silicon)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build (macOS, Clang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake openssl@3

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Rename artifact
        run: cp build/reaper_reaclaw.dylib reaper_reaclaw-macos-arm64.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-macos-arm64
          path: reaper_reaclaw-macos-arm64.dylib

  # ---------------------------------------------------------------------------
  # Windows — MSVC 2022, x64
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows, MSVC)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg OpenSSL
        run: vcpkg install openssl:x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Configure
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Rename artifact
        run: Copy-Item build\Release\reaper_reaclaw.dll reaper_reaclaw-windows-x64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-windows-x64
          path: reaper_reaclaw-windows-x64.dll

  # ---------------------------------------------------------------------------
  # clang-format check
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14

      - name: Check formatting
        run: |
          find src -name "*.cpp" -o -name "*.h" | \
            xargs clang-format-14 --dry-run --Werror

  # ---------------------------------------------------------------------------
  # Release — runs only on version tags; waits for all builds to pass
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List downloaded files
        run: find dist/ -type f

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Grab the block between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ReaClaw ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/reaper_reaclaw-linux-x86_64/reaper_reaclaw-linux-x86_64.so
            dist/reaper_reaclaw-macos-arm64/reaper_reaclaw-macos-arm64.dylib
            dist/reaper_reaclaw-windows-x64/reaper_reaclaw-windows-x64.dll
