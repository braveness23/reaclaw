name: CI

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR — a quick follow-up push
# shouldn't burn the (capacity-limited) self-hosted runner pool finishing a
# now-stale commit. Each tag gets its own ref, so releases are never cancelled
# by another tag's run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Vendor header/SDK versions (SQLite, json.hpp, httplib, reaper-sdk, WDL) are
# pinned in scripts/fetch-vendor-deps.sh, not here — that script is the single
# source of truth for those versions (see the "Fetch vendor deps" step below,
# and its cache key). Duplicating the pins in both places was the actual
# footgun; don't reintroduce it.
env:
  # Pinned REAPER *binary* (distinct from the header-only SDK above) — only
  # used to actually run the extension for the E2E smoke test below. Pinned
  # rather than "latest" so a new REAPER release can't silently break CI.
  REAPER_VERSION: "774"

jobs:
  # ---------------------------------------------------------------------------
  # Linux — the only supported CI target. Runs on the self-hosted k3s runner
  # scale set (arc-runner-reaclaw); the build toolchain (cmake, gcc/g++,
  # clang-format-18, libssl-dev, git, unzip, curl) is baked into the
  # reaclaw-ci-runner image (.github/runner-image/Dockerfile), so jobs don't pay
  # the apt-get cost on every run.
  #
  # The Windows build was re-added (issue #84) as a MinGW-w64 cross-compile on
  # this same x86_64 runner — see the build-windows job below. macOS remains
  # dropped (needs a GitHub-hosted macos runner); the prior macOS (macos-14/
  # Clang) job is in git history if it's ever wanted again.
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build (Linux, GCC)
    runs-on: arc-runner-reaclaw
    env:
      # Absolute path, not `~/.ccache` — GitHub Actions `env:` doesn't do
      # shell tilde-expansion, so a literal `~` would silently break ccache.
      CCACHE_DIR: /home/runner/.ccache
    steps:
      - uses: actions/checkout@v4

      # Keyed on the fetch script's own hash: the script is the single source
      # of truth for vendor versions, so a cache hit is only ever wrong for
      # the unpinned `git clone` of reaper-sdk's default branch (a pre-existing
      # gap, not introduced by caching — see fetch-vendor-deps.sh).
      - name: Cache vendor deps
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: vendor/
          key: vendor-${{ hashFiles('scripts/fetch-vendor-deps.sh') }}

      - name: Fetch vendor deps
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: bash scripts/fetch-vendor-deps.sh

      # Persists gcc's object cache across runs on the same branch so an
      # incremental change (the common case) doesn't recompile the whole
      # extension. scripts/checks/build.sh auto-detects ccache when present
      # (it's baked into the runner image) and no-ops otherwise.
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ github.ref }}-
            ccache-

      - name: Build
        run: bash scripts/checks/build.sh

      - name: Test
        run: bash scripts/checks/test.sh

      - name: Rename artifact
        run: cp build/reaper_reaclaw.so reaper_reaclaw-linux-x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-linux-x86_64
          path: reaper_reaclaw-linux-x86_64.so

  # ---------------------------------------------------------------------------
  # Windows — MinGW-w64 cross-compile on the Linux runner (issue #84).
  #
  # Re-added from git history (commit 4865ed4); the self-hosted runner is
  # x86_64, so the x86_64-w64-mingw32 cross-toolchain installs from apt like on
  # any x86_64 host. OpenSSL is cross-compiled statically and cached. The source
  # is cross-platform (reaper_plugin.h / swell.h guard the SWELL layer out under
  # _WIN32 and use real Win32 instead); verified locally that all TUs compile
  # under mingw. No Test step — can't run a Windows .dll on Linux; the unit
  # tests run in build-linux. This is the agreed "ship on CI-green" bar.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows, MinGW cross-compile)
    runs-on: arc-runner-reaclaw
    env:
      OPENSSL_VERSION: 3.3.2
      OPENSSL_INSTALL: /opt/openssl-mingw64
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 cmake unzip

      - name: Cache cross-compiled OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /opt/openssl-mingw64
          key: openssl-mingw64-${{ env.OPENSSL_VERSION }}

      - name: Cross-compile OpenSSL for Windows
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz | tar xz
          cd openssl-$OPENSSL_VERSION
          ./Configure mingw64 \
            --cross-compile-prefix=x86_64-w64-mingw32- \
            --prefix=$OPENSSL_INSTALL \
            no-shared no-tests
          make -j$(nproc)
          sudo make install_sw

      - name: Fetch vendor deps
        run: |
          curl -fsSL $HTTPLIB_URL   -o vendor/httplib.h
          curl -fsSL $JSON_HPP_URL  -o vendor/json.hpp
          curl -fsSL $SQLITE_ZIP_URL -o /tmp/sqlite.zip
          unzip -j /tmp/sqlite.zip "*/sqlite3.c" "*/sqlite3.h" -d vendor/
          git clone --depth=1 $REAPER_SDK_URL vendor/reaper-sdk
          cp vendor/reaper-sdk/sdk/*.h vendor/reaper-sdk/
          mkdir -p /tmp/wdl-dl
          curl -fsSL https://github.com/justinfrankel/WDL/archive/$WDL_COMMIT.tar.gz | tar xz -C /tmp/wdl-dl
          WDL_DIR=$(ls /tmp/wdl-dl | head -1)
          mkdir -p $GITHUB_WORKSPACE/vendor/WDL
          cp -r /tmp/wdl-dl/$WDL_DIR/WDL/swell $GITHUB_WORKSPACE/vendor/WDL/
          rm -rf /tmp/wdl-dl

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_INSTALL \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DREACLAW_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Rename artifact
        run: cp build/reaper_reaclaw.dll reaper_reaclaw-windows-x86_64.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reaper_reaclaw-windows-x86_64
          path: reaper_reaclaw-windows-x86_64.dll

  # ---------------------------------------------------------------------------
  # E2E: headless offline render smoke test (issue #36, part of Epic #32).
  #
  # Installs a throwaway REAPER (unlicensed — REAPER's evaluation mode is
  # fully functional, no license needed for offline rendering; confirmed live
  # that a completely fresh, never-before-run REAPER install renders
  # correctly with no blocking eval/nag dialog when launched with -nosplash)
  # under Xvfb + a dummy JACK backend, loads the just-built extension, and
  # runs demos/scripts/ci_smoke_test.py: build a tiny composition via the API
  # -> POST /render -> assert the output is non-silent via ReaClaw's own
  # GET /analysis/file (no ffmpeg dependency). The render succeeding for real
  # exercises the executor, the REAPER API bridge, and the audio path against
  # an actual REAPER — the strongest end-to-end test available.
  # ---------------------------------------------------------------------------
  e2e-render-smoke:
    name: E2E render smoke test
    needs: [build-linux]
    runs-on: arc-runner-reaclaw
    steps:
      - uses: actions/checkout@v4

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: reaper_reaclaw-linux-x86_64
          path: dist/

      # Xvfb/jackd2/python3 and REAPER's runtime shared-lib deps (X11/GL/ALSA —
      # confirmed missing live: REAPER failed to load libSwell.so with
      # "libXi.so.6: cannot open shared object file" on a bare toolchain image)
      # are baked into the runner image (.github/runner-image/Dockerfile) so
      # this job doesn't pay the apt-get cost every run. Only the REAPER
      # *binary* itself is fetched per-run, since REAPER_VERSION is pinned
      # here rather than in the Dockerfile (one place for that version, not two).
      - name: Install REAPER
        run: |
          curl -fsSL "https://www.reaper.fm/files/7.x/reaper${REAPER_VERSION}_linux_x86_64.tar.xz" -o /tmp/reaper.tar.xz
          tar -xf /tmp/reaper.tar.xz -C /tmp
          /tmp/reaper_linux_x86_64/install-reaper.sh --install "$HOME/opt" --quiet

      - name: Configure ReaClaw plugin
        run: |
          mkdir -p ~/.config/REAPER/UserPlugins ~/.config/REAPER/reaclaw
          cp dist/reaper_reaclaw-linux-x86_64.so ~/.config/REAPER/UserPlugins/reaper_reaclaw.so
          cat > ~/.config/REAPER/reaclaw/config.json <<'JSON'
          {
            "server":  { "host": "127.0.0.1", "port": 9091, "thread_pool_size": 2 },
            "tls":     { "enabled": true, "generate_if_missing": true, "cert_file": "", "key_file": "" },
            "auth":    { "type": "api_key", "key": "sk_ci_smoke_test" },
            "database": { "path": "" },
            "script_security": { "validate_syntax": true, "log_all_executions": true, "max_script_size_kb": 512 },
            "logging": { "level": "warn", "file": "/tmp/reaclaw_ci.log", "format": "text" }
          }
          JSON
          # Pre-seed the "last version check" timestamp so REAPER believes it
          # just checked and skips its own outbound update check on first
          # launch. Confirmed live (via an instrumented Executor::tick() build
          # on a throwaway debug pod) that skipping this pre-seed lets REAPER
          # pop a modal "New Version Notification" dialog on a truly virgin
          # config — with no window manager to ever dismiss it, that dialog's
          # modal loop blocks REAPER's main thread forever, starving the timer
          # callback that drives every Executor::post-backed endpoint. A
          # long-lived local install never hits this because its config
          # already has a real cached check timestamp.
          printf '[verchk]\nlastt=%s\n' "$(date +%s)" > ~/.config/REAPER/reaper.ini

      - name: Start Xvfb + dummy JACK + REAPER
        run: |
          Xvfb :99 -screen 0 1280x800x24 -ac +extension RANDR > /tmp/xvfb.log 2>&1 &
          disown
          jackd -d dummy -r 48000 > /tmp/jackd.log 2>&1 &
          disown
          sleep 2
          DISPLAY=:99 XAUTHORITY=/dev/null "$HOME/opt/REAPER/reaper" -nosplash -newinst \
            -splashlog /tmp/reaper_splash.log > /tmp/reaper_stdout.log 2>&1 &
          disown

      - name: Run smoke test
        env:
          REACLAW_BASE: https://127.0.0.1:9091
          REACLAW_KEY: sk_ci_smoke_test
        run: python3 demos/scripts/ci_smoke_test.py

      - name: Upload logs for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-test-logs
          path: |
            /tmp/reaclaw_ci.log
            /tmp/reaper_splash.log
            /tmp/reaper_stdout.log
            /tmp/xvfb.log
            /tmp/jackd.log
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # clang-format check
  # ---------------------------------------------------------------------------
  format-check:
    name: clang-format
    runs-on: arc-runner-reaclaw
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: bash scripts/checks/format.sh --check

  # ---------------------------------------------------------------------------
  # Release — runs only on version tags; waits for the Linux build to pass
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: arc-runner-reaclaw
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List downloaded files
        run: find dist/ -type f

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk "/^## \[${VERSION#v}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ReaClaw ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/reaper_reaclaw-linux-x86_64/reaper_reaclaw-linux-x86_64.so
            dist/reaper_reaclaw-windows-x86_64/reaper_reaclaw-windows-x86_64.dll
