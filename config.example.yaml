# ReaClaw Configuration
# Copy this to config.yaml and customize as needed
# All values shown are defaults; omit to use defaults

server:
  # HTTP server binding
  host: "0.0.0.0"          # Listen on all interfaces; use "127.0.0.1" for localhost only
  port: 9091               # Port to listen on

tls:
  # HTTPS configuration
  enabled: true            # Enable HTTPS (required for remote access)
  cert_file: "certs/server.crt"    # Path to TLS certificate
  key_file: "certs/server.key"     # Path to TLS private key
  generate_if_missing: true        # Auto-generate self-signed cert if missing

auth:
  # Authentication mode
  type: "none"             # "none" (default for MVP), "api_key", or "mtls"
  
  # API Key auth (if type: "api_key")
  # All requests must include: Authorization: Bearer sk_your_key_here
  key: "sk_reclaw_default_key_change_me"

  # mTLS auth (if type: "mtls")
  # Requires clients to present valid certificate
  # client_ca: "certs/client_ca.crt"

reaper:
  # Reaper Web Interface integration
  web_interface_url: "http://localhost:8808"  # Reaper's built-in HTTP server
  
  # Optional: ReaClaw Bridge script (Phase 2+)
  # bridge_url: "http://localhost:8809"       # If you deploy the Bridge script
  
  # Timeout for Reaper requests (ms)
  timeout_ms: 5000

database:
  # SQLite configuration (default)
  type: "sqlite"
  path: "reaclawdb.sqlite"    # Database file location
  
  # PostgreSQL configuration (Phase 4+, optional)
  # type: "postgresql"
  # connection_string: "postgres://user:password@localhost/reaclawdb"

logging:
  # Logging configuration
  level: "info"            # "debug", "info", "warn", "error"
  format: "json"           # "json" or "text"
  output: "stdout"         # "stdout", "stderr", or filepath

script_security:
  # Script validation & trust model
  
  # Syntax validation (required for generated scripts)
  validate_syntax: true
  
  # Static analysis (warn on suspicious patterns)
  static_analysis: true
  
  # Require human approval before executing generated scripts
  require_approval: false
  
  # If require_approval: true, how long to wait for approval (hours)
  approval_timeout_hours: 24
  
  # Log all script executions to audit trail
  log_all_executions: true
  
  # Maximum script size (MB)
  max_script_size_mb: 5

rate_limiting:
  # Rate limit configuration
  enabled: true
  
  # Per IP address limits
  per_ip:
    requests_per_minute: 60
    scripts_per_minute: 5
  
  # Per API key limits (if using API key auth)
  per_key:
    requests_per_minute: 120
    scripts_per_minute: 10

caching:
  # Caching strategy
  
  # Cache action catalog (in memory + SQLite)
  # Cleared when Reaper is restarted or manual invalidation
  catalog_cache_enabled: true
  
  # Cache state queries (avoid hammering Reaper)
  state_cache_enabled: true
  state_cache_ttl_seconds: 5  # Refresh state every 5 seconds

llm:
  # LLM configuration for script generation
  provider: "anthropic"    # "anthropic", "openai", "other"
  
  # Anthropic API
  anthropic_api_key: "${ANTHROPIC_API_KEY}"  # Use env var
  anthropic_model: "claude-opus-4-20250514"   # Model for script generation
  
  # OpenAI API (if provider: "openai")
  # openai_api_key: "${OPENAI_API_KEY}"
  # openai_model: "gpt-4"

monitoring:
  # Observability & monitoring
  
  # Enable metrics collection
  metrics_enabled: true
  
  # Export metrics (optional)
  # Format: Prometheus, JSON, stdout
  metrics_format: "prometheus"
  metrics_port: 9090       # Prometheus metrics endpoint
  
  # Enable structured logging
  structured_logging: true
  
  # Audit log file (optional)
  audit_log_file: "reaclawaudit.log"

# Feature flags (for gradual rollout)
features:
  # Script generation (Phase 1+)
  script_generation_enabled: true
  
  # Workflow system (Phase 3+)
  workflows_enabled: true
  
  # Verification & feedback loops (Phase 2+)
  verification_enabled: true
  
  # PostgreSQL support (Phase 4+)
  postgresql_support: false
  
  # OpenClaw/MCP integration (optional)
  mcp_server_enabled: false
  # mcp_server_port: 9092

# Advanced / Experimental

advanced:
  # Worker pool size for async operations
  worker_threads: 4
  
  # Maximum concurrent script registrations
  max_concurrent_registrations: 2
  
  # Enable rollback/undo (Phase 4+)
  enable_rollback: false
  
  # Storage location for generated scripts
  scripts_directory: "${REAPER_SCRIPTS_DIR}"
  
  # Plugins directory (if custom plugins)
  # plugins_directory: "/path/to/reaper/plugins"

---

# Environment Variables
# 
# Override config values with env vars (all prefixed with RECLAW_):
#   RECLAW_SERVER_HOST=0.0.0.0
#   RECLAW_SERVER_PORT=9091
#   RECLAW_AUTH_TYPE=api_key
#   RECLAW_AUTH_KEY=sk_my_secret
#   RECLAW_ANTHROPIC_API_KEY=sk-...
#   RECLAW_DATABASE_PATH=/custom/path/reclaw.db
#   RECLAW_LOGGING_LEVEL=debug
#
# Usage:
#   RECLAW_SERVER_PORT=9092 ./reclaw
#   RECLAW_AUTH_TYPE=api_key RECLAW_AUTH_KEY=sk_prod_key ./reclaw

---

